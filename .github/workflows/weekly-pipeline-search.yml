name: Weekly Pipeline Intelligence

on:
  schedule:
    - cron: "0 14 * * 1"  # Every Monday at 7 AM PDT (14:00 UTC)
  workflow_dispatch:        # Manual trigger from Actions tab

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline intelligence
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST:         smtp.gmail.com
          SMTP_PORT:         "587"
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:     ${{ secrets.SMTP_PASSWORD }}
          DIGEST_TO_EMAIL:   ${{ secrets.DIGEST_TO_EMAIL }}
        run: python pipeline_radar.py

      - name: Commit updated pipeline files
        run: |
          git config user.name  "rfp-radar[bot]"
          git config user.email "rfp-radar[bot]@users.noreply.github.com"
          git add data/pipeline.json data/pipeline_seen.json
          git diff --cached --quiet || git commit -m "chore: update pipeline [$(date '+%Y-%m-%d')]"
          git push
